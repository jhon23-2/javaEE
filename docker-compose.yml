version: '3.8'

services:
  database:
    image: postgres:15
    container_name: javaee_postgres_container
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgresql_volume:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgresql_volume: